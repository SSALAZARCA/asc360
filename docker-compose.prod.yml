version: '3.8'

networks:
  um_backend_net:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: um_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Sin exposición de puerto al exterior — solo accesible dentro de la red Docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - um_backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: um_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # Sin exposición de puerto al exterior
    volumes:
      - redis_data:/data
    networks:
      - um_backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio
    container_name: um_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    # Solo el API de MinIO (9000) accesible internamente — consola (9001) cerrada
    volumes:
      - minio_data:/data
    networks:
      - um_backend_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: um_backend
    restart: always
    # Sin exposición de puerto al exterior — nginx hace el proxy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_SECURE=false
      - SECRET_KEY=${SECRET_KEY}
      - SONIA_BOT_SECRET=${SONIA_BOT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - um_backend_net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: um_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    networks:
      - um_backend_net

  sonia-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: um_sonia_bot
    restart: always
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_URL=http://backend:8000/api/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SONIA_BOT_SECRET=${SONIA_BOT_SECRET}
      - USE_UNIFIED_INTENT=${USE_UNIFIED_INTENT:-true}
      - USER_CACHE_TTL_SECONDS=${USER_CACHE_TTL_SECONDS:-3600}
      - OPENAI_MAX_RETRIES=${OPENAI_MAX_RETRIES:-3}
    depends_on:
      - backend
    networks:
      - um_backend_net

  nginx:
    image: nginx:alpine
    container_name: um_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - um_backend_net

  certbot:
    image: certbot/certbot
    container_name: um_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Se ejecuta manualmente — no corre como servicio permanente
    profiles:
      - certbot

volumes:
  postgres_data:
  redis_data:
  minio_data:
  certbot_www:
  certbot_certs:
