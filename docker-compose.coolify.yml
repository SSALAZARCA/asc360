services:
  asc360-db:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-umadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-UmAdmin2024Secure}
      POSTGRES_DB: ${POSTGRES_DB:-um_service_db}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data_v5:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-umadmin} -d ${POSTGRES_DB:-um_service_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data_v5:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data_v5:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://umadmin:UmAdmin2024Secure@asc360-db:5432/um_service_db
      - REDIS_URL=redis://:Redis2024Secure@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=umadmin
      - MINIO_SECRET_KEY=Minio2024Secure
      - MINIO_SECURE=false
      - SECRET_KEY=${SECRET_KEY}
      - SONIA_BOT_SECRET=${SONIA_BOT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ENVIRONMENT=production
    depends_on:
      asc360-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.https-asc360-backend.entryPoints=https
      - "traefik.http.routers.https-asc360-backend.rule=Host(`asc360.online`) && PathPrefix(`/api`)"
      - traefik.http.routers.https-asc360-backend.tls=true
      - traefik.http.routers.https-asc360-backend.tls.certresolver=letsencrypt
      - traefik.http.routers.https-asc360-backend.priority=10
      - traefik.http.services.https-asc360-backend.loadbalancer.server.port=8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://asc360.online/api/v1
    restart: always
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://asc360.online/api/v1
    depends_on:
      - backend
    networks:
      - default
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.gzip.compress=true
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.routers.http-asc360-frontend.entryPoints=http
      - "traefik.http.routers.http-asc360-frontend.rule=Host(`asc360.online`) || Host(`www.asc360.online`)"
      - traefik.http.routers.http-asc360-frontend.middlewares=redirect-to-https
      - traefik.http.routers.https-asc360-frontend.entryPoints=https
      - "traefik.http.routers.https-asc360-frontend.rule=Host(`asc360.online`) || Host(`www.asc360.online`)"
      - traefik.http.routers.https-asc360-frontend.middlewares=gzip
      - traefik.http.routers.https-asc360-frontend.tls=true
      - traefik.http.routers.https-asc360-frontend.tls.certresolver=letsencrypt
      - traefik.http.routers.https-asc360-frontend.priority=1
      - traefik.http.services.https-asc360-frontend.loadbalancer.server.port=3000

  sonia-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    restart: always
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_URL=http://backend:8000/api/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SONIA_BOT_SECRET=${SONIA_BOT_SECRET}
      - USE_UNIFIED_INTENT=${USE_UNIFIED_INTENT:-true}
      - USER_CACHE_TTL_SECONDS=${USER_CACHE_TTL_SECONDS:-3600}
      - OPENAI_MAX_RETRIES=${OPENAI_MAX_RETRIES:-3}
    depends_on:
      - backend

networks:
  coolify:
    external: true

volumes:
  postgres_data_v5:
  redis_data_v5:
  minio_data_v5:
